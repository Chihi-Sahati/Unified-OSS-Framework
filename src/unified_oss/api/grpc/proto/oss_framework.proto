/**
 * Unified OSS Framework gRPC Protocol Definitions
 * 
 * This protocol buffer definition provides comprehensive gRPC services for
 * the FCAPS (Fault, Configuration, Accounting, Performance, Security) 
 * management framework supporting multi-vendor telecommunications networks.
 * 
 * Services:
 *   - AlarmService: Fault management operations
 *   - PerformanceService: Performance monitoring and KPI management
 *   - ConfigurationService: Configuration management and versioning
 *   - SecurityService: Security and access control management
 *   - AccountingService: License and capacity management
 * 
 * Version: 1.0.0
 * Author: Unified OSS Framework Team
 */

syntax = "proto3";

package unified_oss.v1;

option go_package = "github.com/unified-oss/framework/api/grpc/v1;v1";
option java_multiple_files = true;
option java_package = "com.unifiedoss.framework.api.grpc.v1";
option java_outer_classname = "UnifiedOSSProto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";

// =============================================================================
// Common Messages
// =============================================================================

/**
 * Request metadata for tracing and authentication.
 */
message RequestMetadata {
  string request_id = 1;
  string user_id = 2;
  string client_id = 3;
  google.protobuf.Timestamp timestamp = 4;
  map<string, string> headers = 5;
}

/**
 * Standard error response.
 */
message ErrorDetail {
  string code = 1;
  string message = 2;
  string details = 3;
  map<string, string> metadata = 4;
}

/**
 * Pagination parameters for list operations.
 */
message PaginationRequest {
  int32 page_size = 1;
  string page_token = 2;
}

/**
 * Pagination response information.
 */
message PaginationResponse {
  string next_page_token = 1;
  int32 total_count = 2;
  bool has_more = 3;
}

/**
 * Time range filter for queries.
 */
message TimeRange {
  google.protobuf.Timestamp start_time = 1;
  google.protobuf.Timestamp end_time = 2;
}

/**
 * Vendor identifier enumeration.
 */
enum Vendor {
  VENDOR_UNSPECIFIED = 0;
  VENDOR_ERICSSON = 1;
  VENDOR_HUAWEI = 2;
  VENDOR_NOKIA = 3;
  VENDOR_CISCO = 4;
  VENDOR_ZTE = 5;
}

/**
 * Severity levels for alarms and alerts.
 */
enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_CRITICAL = 1;
  SEVERITY_MAJOR = 2;
  SEVERITY_MINOR = 3;
  SEVERITY_WARNING = 4;
  SEVERITY_INFORMATIONAL = 5;
  SEVERITY_CLEARED = 6;
}

// =============================================================================
// Alarm Service Messages
// =============================================================================

/**
 * Alarm lifecycle state.
 */
enum AlarmState {
  ALARM_STATE_UNSPECIFIED = 0;
  ALARM_STATE_RAISED = 1;
  ALARM_STATE_UPDATED = 2;
  ALARM_STATE_CLEARED = 3;
  ALARM_STATE_ACKNOWLEDGED = 4;
  ALARM_STATE_SUPPRESSED = 5;
}

/**
 * Alarm represents a normalized fault notification.
 */
message Alarm {
  string alarm_id = 1;
  string correlation_key = 2;
  Vendor source = 3;
  Severity severity = 4;
  AlarmState state = 5;
  string resource_path = 6;
  string alarm_text = 7;
  string probable_cause = 8;
  string specific_problem = 9;
  google.protobuf.Timestamp raised_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  google.protobuf.Timestamp cleared_at = 12;
  google.protobuf.Timestamp acknowledged_at = 13;
  string acknowledged_by = 14;
  int32 notification_count = 15;
  map<string, string> additional_info = 16;
  map<string, string> vendor_data = 17;
}

/**
 * Request for retrieving alarms with filters.
 */
message GetAlarmsRequest {
  RequestMetadata metadata = 1;
  repeated Severity severities = 2;
  repeated Vendor sources = 3;
  repeated AlarmState states = 4;
  string resource_prefix = 5;
  TimeRange time_range = 6;
  PaginationRequest pagination = 7;
  google.protobuf.FieldMask field_mask = 8;
}

/**
 * Response containing alarm list.
 */
message GetAlarmsResponse {
  repeated Alarm alarms = 1;
  PaginationResponse pagination = 2;
  int32 total_count = 3;
  map<string, int32> severity_counts = 4;
}

/**
 * Request to acknowledge an alarm.
 */
message AcknowledgeAlarmRequest {
  RequestMetadata metadata = 1;
  string alarm_id = 2;
  string user = 3;
  string comment = 4;
  bool acknowledge_related = 5;
}

/**
 * Response for alarm acknowledgment.
 */
message AcknowledgeAlarmResponse {
  Alarm alarm = 1;
  bool success = 2;
  repeated string related_alarm_ids = 3;
  google.protobuf.Timestamp acknowledged_at = 4;
}

/**
 * Request to clear an alarm.
 */
message ClearAlarmRequest {
  RequestMetadata metadata = 1;
  string alarm_id = 2;
  string user = 3;
  string reason = 4;
}

/**
 * Response for alarm clearance.
 */
message ClearAlarmResponse {
  Alarm alarm = 1;
  bool success = 2;
  google.protobuf.Timestamp cleared_at = 3;
}

/**
 * Request to subscribe to alarm notifications.
 */
message SubscribeAlarmsRequest {
  RequestMetadata metadata = 1;
  repeated Severity severities = 2;
  repeated Vendor sources = 3;
  string resource_prefix = 4;
  bool include_cleared = 5;
  google.protobuf.Duration heartbeat_interval = 6;
}

/**
 * Alarm notification event.
 */
message AlarmNotification {
  string subscription_id = 1;
  string event_type = 2;  // alarm_raised, alarm_cleared, alarm_updated, alarm_acknowledged
  Alarm alarm = 3;
  google.protobuf.Timestamp event_time = 4;
}

// =============================================================================
// Performance Service Messages
// =============================================================================

/**
 * KPI category enumeration.
 */
enum KPICategory {
  KPI_CATEGORY_UNSPECIFIED = 0;
  KPI_CATEGORY_AVAILABILITY = 1;
  KPI_CATEGORY_QUALITY = 2;
  KPI_CATEGORY_CAPACITY = 3;
  KPI_CATEGORY_MOBILITY = 4;
  KPI_CATEGORY_THROUGHPUT = 5;
  KPI_CATEGORY_RETAINABILITY = 6;
}

/**
 * KPI aggregation methods.
 */
enum KPIAggregation {
  KPI_AGGREGATION_UNSPECIFIED = 0;
  KPI_AGGREGATION_RAW = 1;
  KPI_AGGREGATION_AVG = 2;
  KPI_AGGREGATION_SUM = 3;
  KPI_AGGREGATION_MIN = 4;
  KPI_AGGREGATION_MAX = 5;
  KPI_AGGREGATION_PERCENTILE_95 = 6;
  KPI_AGGREGATION_PERCENTILE_99 = 7;
}

/**
 * KPI definition from the catalog.
 */
message KPIDefinition {
  string kpi_id = 1;
  string name = 2;
  string description = 3;
  KPICategory category = 4;
  string unit = 5;
  string formula = 6;
  map<string, string> tags = 7;
  map<string, double> thresholds = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

/**
 * KPI result with computed value.
 */
message KPIResult {
  string kpi_id = 1;
  double value = 2;
  string unit = 3;
  google.protobuf.Timestamp timestamp = 4;
  string ne_id = 5;
  string quality_flag = 6;
  map<string, double> raw_counters = 7;
  map<string, string> metadata = 8;
}

/**
 * Metric data point.
 */
message Metric {
  string metric_id = 1;
  string name = 2;
  string ne_id = 3;
  double value = 4;
  string unit = 5;
  google.protobuf.Timestamp timestamp = 6;
  map<string, string> labels = 7;
  map<string, double> dimensions = 8;
}

/**
 * Request for retrieving KPIs.
 */
message GetKPIsRequest {
  RequestMetadata metadata = 1;
  repeated string kpi_ids = 2;
  repeated string ne_ids = 3;
  KPICategory category = 4;
  bool include_definitions = 5;
}

/**
 * Response containing KPI definitions and values.
 */
message GetKPIsResponse {
  repeated KPIDefinition definitions = 1;
  repeated KPIResult results = 2;
  map<string, string> vendor_mappings = 3;
}

/**
 * Request for retrieving metrics.
 */
message GetMetricsRequest {
  RequestMetadata metadata = 1;
  repeated string metric_names = 2;
  repeated string ne_ids = 3;
  TimeRange time_range = 4;
  KPIAggregation aggregation = 5;
  google.protobuf.Duration interval = 6;
  map<string, string> label_filters = 7;
  PaginationRequest pagination = 8;
}

/**
 * Response containing metrics.
 */
message GetMetricsResponse {
  repeated Metric metrics = 1;
  PaginationResponse pagination = 2;
  map<string, KPIResult> aggregated_results = 3;
}

/**
 * Request to subscribe to KPI updates.
 */
message SubscribeKPIsRequest {
  RequestMetadata metadata = 1;
  repeated string kpi_ids = 2;
  repeated string ne_ids = 3;
  google.protobuf.Duration interval = 4;
  double threshold_min = 5;
  double threshold_max = 6;
  bool include_history = 7;
}

/**
 * KPI notification event.
 */
message KPINotification {
  string subscription_id = 1;
  KPIResult result = 2;
  string event_type = 3;
  bool threshold_breach = 4;
  string breach_direction = 5;  // above, below
  google.protobuf.Timestamp event_time = 6;
}

/**
 * Threshold breach information.
 */
message ThresholdBreach {
  string kpi_id = 1;
  string ne_id = 2;
  double current_value = 3;
  double threshold_value = 4;
  string threshold_type = 5;  // warning, critical
  string breach_direction = 6;
  google.protobuf.Timestamp breach_time = 7;
  int32 duration_seconds = 8;
}

/**
 * Request for threshold breaches.
 */
message GetThresholdBreachesRequest {
  RequestMetadata metadata = 1;
  repeated string kpi_ids = 2;
  repeated string ne_ids = 3;
  repeated string threshold_types = 4;
  TimeRange time_range = 5;
  bool active_only = 6;
  PaginationRequest pagination = 7;
}

/**
 * Response containing threshold breaches.
 */
message GetThresholdBreachesResponse {
  repeated ThresholdBreach breaches = 1;
  PaginationResponse pagination = 2;
  int32 total_breaches = 3;
  map<string, int32> breaches_by_kpi = 4;
}

// =============================================================================
// Configuration Service Messages
// =============================================================================

/**
 * Configuration status enumeration.
 */
enum ConfigStatus {
  CONFIG_STATUS_UNSPECIFIED = 0;
  CONFIG_STATUS_DRAFT = 1;
  CONFIG_STATUS_PENDING_APPROVAL = 2;
  CONFIG_STATUS_APPROVED = 3;
  CONFIG_STATUS_STAGED = 4;
  CONFIG_STATUS_DEPLOYED = 5;
  CONFIG_STATUS_FAILED = 6;
  CONFIG_STATUS_ROLLED_BACK = 7;
}

/**
 * Configuration operation type.
 */
enum ConfigOperation {
  CONFIG_OPERATION_UNSPECIFIED = 0;
  CONFIG_OPERATION_CREATE = 1;
  CONFIG_OPERATION_MERGE = 2;
  CONFIG_OPERATION_REPLACE = 3;
  CONFIG_OPERATION_DELETE = 4;
  CONFIG_OPERATION_NONE = 5;
}

/**
 * Configuration version information.
 */
message ConfigVersion {
  string version_id = 1;
  int32 version_number = 2;
  string config_id = 3;
  string content_hash = 4;
  ConfigStatus status = 5;
  google.protobuf.Timestamp created_at = 6;
  string created_by = 7;
  string comment = 8;
  string parent_version_id = 9;
  repeated ConfigChange changes = 10;
}

/**
 * Configuration change description.
 */
message ConfigChange {
  string change_type = 1;  // added, removed, modified
  string xpath = 2;
  string old_value = 3;
  string new_value = 4;
  string description = 5;
}

/**
 * Request to apply configuration.
 */
message ApplyConfigRequest {
  RequestMetadata metadata = 1;
  string config_id = 2;
  string content = 3;
  string content_type = 4;  // xml, json, yang
  ConfigOperation operation = 5;
  Vendor vendor = 6;
  string comment = 7;
  bool skip_validation = 8;
  bool dry_run = 9;
}

/**
 * Response for configuration apply.
 */
message ApplyConfigResponse {
  ConfigVersion version = 1;
  bool success = 2;
  repeated string validation_errors = 3;
  repeated string warnings = 4;
  google.protobuf.Timestamp applied_at = 5;
}

/**
 * Request to rollback configuration.
 */
message RollbackConfigRequest {
  RequestMetadata metadata = 1;
  string config_id = 2;
  string target_version_id = 3;
  string reason = 4;
}

/**
 * Response for configuration rollback.
 */
message RollbackConfigResponse {
  ConfigVersion version = 1;
  bool success = 2;
  string previous_version_id = 3;
  google.protobuf.Timestamp rolled_back_at = 4;
}

/**
 * Request to get configuration diff.
 */
message GetDiffRequest {
  RequestMetadata metadata = 1;
  string config_id = 2;
  string version_id_1 = 3;
  string version_id_2 = 4;
  bool include_content = 5;
  string diff_format = 6;  // unified, side_by_side, json
}

/**
 * Response for configuration diff.
 */
message GetDiffResponse {
  repeated ConfigChange changes = 1;
  string diff_text = 2;
  int32 additions = 3;
  int32 deletions = 4;
  int32 modifications = 5;
}

/**
 * Request for configuration history.
 */
message GetConfigHistoryRequest {
  RequestMetadata metadata = 1;
  string config_id = 2;
  int32 limit = 3;
  string offset_token = 4;
  ConfigStatus status_filter = 5;
  string user_filter = 6;
  TimeRange time_range = 7;
}

/**
 * Response for configuration history.
 */
message GetConfigHistoryResponse {
  repeated ConfigVersion versions = 1;
  PaginationResponse pagination = 2;
  int32 current_version_number = 3;
}

// =============================================================================
// Security Service Messages
// =============================================================================

/**
 * Access decision result.
 */
enum AccessDecision {
  ACCESS_DECISION_UNSPECIFIED = 0;
  ACCESS_DECISION_ALLOW = 1;
  ACCESS_DECISION_DENY = 2;
  ACCESS_DECISION_DENY_WITH_CHALLENGE = 3;
}

/**
 * Authentication method.
 */
enum AuthMethod {
  AUTH_METHOD_UNSPECIFIED = 0;
  AUTH_METHOD_PASSWORD = 1;
  AUTH_METHOD_OAUTH2 = 2;
  AUTH_METHOD_MFA_TOTP = 3;
  AUTH_METHOD_MFA_SMS = 4;
  AUTH_METHOD_CERTIFICATE = 5;
  AUTH_METHOD_API_KEY = 6;
}

/**
 * Access evaluation request.
 */
message EvaluateAccessRequest {
  RequestMetadata metadata = 1;
  string user_id = 2;
  string resource = 3;
  string action = 4;
  string resource_type = 5;
  map<string, string> context = 6;
  repeated string roles = 7;
}

/**
 * Access evaluation response.
 */
message EvaluateAccessResponse {
  AccessDecision decision = 1;
  string reason = 2;
  repeated string missing_permissions = 3;
  map<string, string> obligations = 4;
  google.protobuf.Timestamp evaluated_at = 5;
  string policy_id = 6;
}

/**
 * Credential type enumeration.
 */
enum CredentialType {
  CREDENTIAL_TYPE_UNSPECIFIED = 0;
  CREDENTIAL_TYPE_PASSWORD = 1;
  CREDENTIAL_TYPE_API_KEY = 2;
  CREDENTIAL_TYPE_CERTIFICATE = 3;
  CREDENTIAL_TYPE_OAUTH_TOKEN = 4;
  CREDENTIAL_TYPE_SSH_KEY = 5;
}

/**
 * Request to rotate credentials.
 */
message RotateCredentialsRequest {
  RequestMetadata metadata = 1;
  string user_id = 2;
  CredentialType credential_type = 3;
  string reason = 4;
  bool revoke_existing = 5;
  google.protobuf.Duration transition_period = 6;
  repeated string notify_channels = 7;
}

/**
 * Response for credential rotation.
 */
message RotateCredentialsResponse {
  bool success = 1;
  string new_credential_id = 2;
  google.protobuf.Timestamp rotated_at = 3;
  google.protobuf.Timestamp old_credential_expires = 4;
  repeated string affected_systems = 5;
}

/**
 * Audit log entry.
 */
message AuditLogEntry {
  string entry_id = 1;
  string user_id = 2;
  string action = 3;
  string resource = 4;
  string resource_type = 5;
  google.protobuf.Timestamp timestamp = 6;
  string ip_address = 7;
  string user_agent = 8;
  bool success = 9;
  string error_message = 10;
  map<string, string> details = 11;
  map<string, string> before_state = 12;
  map<string, string> after_state = 13;
}

/**
 * Request for audit log.
 */
message GetAuditLogRequest {
  RequestMetadata metadata = 1;
  string user_id = 2;
  string action = 3;
  string resource = 4;
  bool success_only = 5;
  bool failures_only = 6;
  TimeRange time_range = 7;
  PaginationRequest pagination = 8;
}

/**
 * Response for audit log.
 */
message GetAuditLogResponse {
  repeated AuditLogEntry entries = 1;
  PaginationResponse pagination = 2;
  int32 total_count = 3;
  map<string, int32> actions_count = 4;
}

// =============================================================================
// Accounting Service Messages
// =============================================================================

/**
 * License status enumeration.
 */
enum LicenseStatus {
  LICENSE_STATUS_UNSPECIFIED = 0;
  LICENSE_STATUS_VALID = 1;
  LICENSE_STATUS_EXPIRED = 2;
  LICENSE_STATUS_EXCEEDED = 3;
  LICENSE_STATUS_NOT_INSTALLED = 4;
  LICENSE_STATUS_SUSPENDED = 5;
  LICENSE_STATUS_PENDING_ACTIVATION = 6;
  LICENSE_STATUS_REVOKED = 7;
  LICENSE_STATUS_TRIAL = 8;
}

/**
 * License type enumeration.
 */
enum LicenseType {
  LICENSE_TYPE_UNSPECIFIED = 0;
  LICENSE_TYPE_PERPETUAL = 1;
  LICENSE_TYPE_SUBSCRIPTION_MONTHLY = 2;
  LICENSE_TYPE_SUBSCRIPTION_ANNUAL = 3;
  LICENSE_TYPE_USAGE_BASED = 4;
  LICENSE_TYPE_PER_NODE = 5;
  LICENSE_TYPE_PER_USER = 6;
  LICENSE_TYPE_PER_CORE = 7;
  LICENSE_TYPE_PER_INSTANCE = 8;
  LICENSE_TYPE_ENTERPRISE = 9;
}

/**
 * License feature information.
 */
message LicenseFeature {
  string feature_id = 1;
  string name = 2;
  string description = 3;
  bool is_enabled = 4;
  int64 capacity_limit = 5;
  int64 current_usage = 6;
  double utilization_percentage = 7;
  google.protobuf.Timestamp expires_at = 8;
  bool is_available = 9;
}

/**
 * License information.
 */
message License {
  string license_id = 1;
  string name = 2;
  Vendor vendor = 3;
  LicenseType license_type = 4;
  LicenseStatus status = 5;
  google.protobuf.Timestamp installed_at = 6;
  google.protobuf.Timestamp expires_at = 7;
  int64 capacity_total = 8;
  int64 capacity_used = 9;
  double utilization_percentage = 10;
  int32 days_until_expiry = 11;
  repeated LicenseFeature features = 12;
  string cost_center = 13;
  map<string, string> metadata = 14;
}

/**
 * Request for license status.
 */
message GetLicenseStatusRequest {
  RequestMetadata metadata = 1;
  string license_id = 2;
  bool include_features = 3;
  bool include_utilization = 4;
}

/**
 * Response for license status.
 */
message GetLicenseStatusResponse {
  License license = 1;
  bool is_valid = 2;
  bool is_expired = 3;
  string compliance_status = 4;
  int32 features_available = 5;
  int32 features_total = 6;
  map<string, string> vendor_data = 7;
}

/**
 * Capacity metric for tracking.
 */
message CapacityMetric {
  string metric_id = 1;
  string name = 2;
  string capacity_type = 3;
  Vendor vendor = 4;
  string ne_id = 5;
  double total_capacity = 6;
  double used_capacity = 7;
  double available_capacity = 8;
  double utilization_percentage = 9;
  string unit = 10;
  google.protobuf.Timestamp timestamp = 11;
  map<string, string> tags = 12;
}

/**
 * Procurement recommendation.
 */
message ProcurementRecommendation {
  string recommendation_id = 1;
  string metric_id = 2;
  string priority = 3;  // urgent, high, medium, low
  string title = 4;
  string description = 5;
  double current_capacity = 6;
  double recommended_capacity = 7;
  double estimated_cost = 8;
  string currency = 9;
  string rationale = 10;
  google.protobuf.Timestamp created_at = 11;
}

/**
 * Request for capacity summary.
 */
message GetCapacitySummaryRequest {
  RequestMetadata metadata = 1;
  repeated string capacity_types = 2;
  string ne_id = 3;
  Vendor vendor = 4;
  bool include_recommendations = 5;
}

/**
 * Response for capacity summary.
 */
message GetCapacitySummaryResponse {
  repeated CapacityMetric metrics = 1;
  double overall_utilization = 2;
  int32 critical_count = 3;
  int32 warning_count = 4;
  repeated ProcurementRecommendation recommendations = 5;
  map<string, double> capacity_by_type = 6;
  google.protobuf.Timestamp last_updated = 7;
}

// =============================================================================
// Service Definitions
// =============================================================================

/**
 * AlarmService provides fault management operations.
 * 
 * Supports alarm retrieval, acknowledgment, clearing, and real-time
 * notifications through server-side streaming.
 */
service AlarmService {
  // Retrieves alarms with optional filtering
  rpc GetAlarms(GetAlarmsRequest) returns (GetAlarmsResponse);
  
  // Acknowledges one or more alarms
  rpc AcknowledgeAlarm(AcknowledgeAlarmRequest) returns (AcknowledgeAlarmResponse);
  
  // Clears an alarm
  rpc ClearAlarm(ClearAlarmRequest) returns (ClearAlarmResponse);
  
  // Subscribe to real-time alarm notifications
  rpc SubscribeAlarms(SubscribeAlarmsRequest) returns (stream AlarmNotification);
}

/**
 * PerformanceService provides performance monitoring operations.
 * 
 * Supports KPI management, metrics retrieval, threshold monitoring,
 * and real-time KPI subscriptions.
 */
service PerformanceService {
  // Retrieves KPI definitions and current values
  rpc GetKPIs(GetKPIsRequest) returns (GetKPIsResponse);
  
  // Retrieves metrics with aggregation support
  rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse);
  
  // Subscribe to real-time KPI updates
  rpc SubscribeKPIs(SubscribeKPIsRequest) returns (stream KPINotification);
  
  // Retrieves threshold breach history
  rpc GetThresholdBreaches(GetThresholdBreachesRequest) returns (GetThresholdBreachesResponse);
}

/**
 * ConfigurationService provides configuration management operations.
 * 
 * Supports configuration application, rollback, diff comparison,
 * and version history tracking.
 */
service ConfigurationService {
  // Applies a new configuration version
  rpc ApplyConfig(ApplyConfigRequest) returns (ApplyConfigResponse);
  
  // Rolls back to a previous configuration version
  rpc RollbackConfig(RollbackConfigRequest) returns (RollbackConfigResponse);
  
  // Gets the diff between two configuration versions
  rpc GetDiff(GetDiffRequest) returns (GetDiffResponse);
  
  // Retrieves configuration version history
  rpc GetConfigHistory(GetConfigHistoryRequest) returns (GetConfigHistoryResponse);
}

/**
 * SecurityService provides security management operations.
 * 
 * Supports access evaluation, credential rotation, and audit log retrieval.
 */
service SecurityService {
  // Evaluates access permissions for a user
  rpc EvaluateAccess(EvaluateAccessRequest) returns (EvaluateAccessResponse);
  
  // Rotates user credentials
  rpc RotateCredentials(RotateCredentialsRequest) returns (RotateCredentialsResponse);
  
  // Retrieves audit log entries
  rpc GetAuditLog(GetAuditLogRequest) returns (GetAuditLogResponse);
}

/**
 * AccountingService provides license and capacity management operations.
 * 
 * Supports license status tracking and capacity summary reporting.
 */
service AccountingService {
  // Retrieves license status information
  rpc GetLicenseStatus(GetLicenseStatusRequest) returns (GetLicenseStatusResponse);
  
  // Retrieves capacity utilization summary
  rpc GetCapacitySummary(GetCapacitySummaryRequest) returns (GetCapacitySummaryResponse);
}
