models:
  alarm_classification:
    type: xgboost
    path: ./models/trained/alarm_classifier_v1.pkl
    version: "1.0.0"
    trained_date: "2026-03-21"
    features:
      - alarm_code_encoded
      - vendor_encoded
      - element_type_encoded
      - time_of_day
      - day_of_week
      - historical_frequency
    classes:
      - Critical
      - Major
      - Minor
      - Warning
    accuracy: 0.94
    retrain_threshold: 0.85

  anomaly_detection:
    type: isolation_forest
    path: ./models/trained/anomaly_detector_v1.pkl
    version: "1.0.0"
    trained_date: "2026-03-21"
    contamination: 0.05
    n_estimators: 100
    max_samples: 256
    accuracy: 0.91

  correlation_engine:
    type: bayesian_network
    path: ./models/trained/correlation_v1.pkl
    version: "1.0.0"
    trained_date: "2026-03-21"
    nodes:
      - power_failure
      - link_down
      - node_unreachable
      - service_degradation
    edges:
      - power_failure -> node_unreachable
      - link_down -> service_degradation
    accuracy: 0.89

  trend_prediction:
    type: prophet
    path: ./models/trained/trend_v1.pkl
    version: "1.0.0"
    trained_date: "2026-03-21"
    forecast_horizon: 24h
    seasonality: daily, weekly

training:
  data_source: ./simulation_data/alarms/
  validation_split: 0.2
  cross_validation_folds: 5
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score

deployment:
  load_on_startup: true
  cache_models: true
  hot_reload_enabled: false
  version_control: true
