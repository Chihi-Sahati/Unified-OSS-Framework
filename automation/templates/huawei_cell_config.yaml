# Huawei Cell Configuration Template
# For NETCONF Configuration Push Automation Tool

# Network Element Identification
ne_id: "HW-BTS-001"
ne_type: "bts"
vendor: "huawei"

# Cell Configuration
cell_config:
  # Cell Identity
  cell_id: 1
  physical_cell_id: 200
  
  # Frequency Configuration
  frequency_band: 7        # Band 7 (2600 MHz)
  downlink_frequency: 2660  # MHz
  uplink_frequency: 2545    # MHz
  bandwidth: 20             # MHz
  
  # Cell Parameters
  tac: 2001
  cell_reserved: false
  
  # Power Configuration
  reference_signal_power: 15  # dBm
  pb: 1                        # PDSCH RE Power Offset
  pa: -3                       # PDSCH EPRE Ratio
  
  # Beamforming Configuration (for NR)
  beamforming:
    enabled: false
    beam_count: 8
  
  # SSB Configuration (5G NR)
  ssb_config:
    ssb_period: 20           # ms
    ssb_subcarrier_spacing: 30  # kHz
    ssb_offset: 0
    ssb_pattern: "Case_C"     # For band n78
  
  # PRACH Configuration
  prach_config:
    prach_config_index: 0
    root_sequence_index: 0
    zero_correlation_zone_config: 5
    high_speed_flag: false
    prach_frequency_offset: 0
  
  # Huawei-specific parameters
  huawei_specific:
    # U2020 Management Settings
    management_system: "u2020"
    
    # Intelligent Features
    ai_optimization_enabled: false
    
    # Telemetry Settings
    streaming_telemetry_enabled: true
    grpc_port: 57400
    sample_interval_ms: 10000
    
    # Performance Monitoring
    pm_collection_interval: 15  # minutes

# NETCONF Configuration Payload (YANG-compliant XML)
payload: |
  <config xmlns="urn:ietf:params:xml:ns:netconf:base:1.0">
    <network-elements xmlns="urn:unified-oss:core-nrm">
      <network-element>
        <ne-id>HW-BTS-001</ne-id>
        <vendor>huawei</vendor>
        <ne-type>bts</ne-type>
        <cells>
          <cell>
            <cell-id>1</cell-id>
            <physical-cell-id>200</physical-cell-id>
            <frequency-band>7</frequency-band>
            <bandwidth>20</bandwidth>
            <tac>2001</tac>
            <status>active</status>
            <power-config>
              <reference-signal-power>15</reference-signal-power>
            </power-config>
          </cell>
        </cells>
      </network-element>
    </network-elements>
  </config>

# Huawei U2020 SBI Configuration
u2020_config:
  sbi_endpoint: "http://u2020-server:8080/api/v1"
  authentication:
    type: "oauth2"
    token_url: "http://u2020-server:8080/oauth/token"
  
  intent_config:
    intent_name: "cell-deployment"
    description: "Deploy new cell configuration"
    target_slice: "default"

# Validation Rules
validation:
  required_fields:
    - cell_id
    - physical_cell_id
    - frequency_band
    - bandwidth
    - tac
  
  ranges:
    physical_cell_id: [0, 503]
    bandwidth: [5, 10, 15, 20]
    frequency_band: [1, 3, 7, 8, 20, 28, 38, 41, 77, 78, 79]

# Rollback Configuration
rollback:
  enabled: true
  preserve_running_config: true
  auto_rollback_on_validation_failure: true

# Metadata
metadata:
  created_at: "2024-03-20T00:00:00Z"
  author: "unified-oss-automation"
  version: "1.0.0"
  description: "Huawei LTE/NR Cell Configuration Template for U2000/U2020"
